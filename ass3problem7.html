
  <!DOCTYPE html>
<html>
<head>
<title>Problem 7</title>
<style>
.bottom-right { position: fixed; bottom: 10px; right: 10px; }
</style>

<script>
function printNumbers() {
    var n = document.getElementById("num").value;
    var i = 1;
    var output = "";

    while(i <= n) {
        output += i + " ";
        i++;
    }

    document.getElementById("res").innerHTML = output;
}
</script>
</head>

<body>
<input type="number" id="num">
<button onclick="printNumbers()">Print</button>
<p id="res"></p>

<div class="bottom-right">24BCE0572, VAIBHAV VANGOORI</div>
</body>
</html>
