<!DOCTYPE html>
<html>
<head>
<title>Problem 15</title>
<style>
.bottom-right { position: fixed; bottom: 10px; right: 10px; }
</style>

<script>
function change() {
    var text = document.getElementById("text");

    text.style.fontSize = document.getElementById("size").value + "px";
    text.style.color = document.getElementById("color").value;
    text.style.backgroundColor = document.getElementById("bg").value;
}
</script>
</head>

<body>
<p id="text">vaibhav vangoori</p>

Size: <input type="range" id="size" min="10" max="50"><br>
Text Color: <input type="color" id="color"><br>
BG Color: <input type="color" id="bg"><br>

<button onclick="change()">Apply</button>

<div class="bottom-right">24BCE0572, VAIBHAV VANGOORI</div>
</body>
</html>
